<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Post 4 – Sommerquiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #87CEEB 0%, #FFF176 55%, #FFB74D 100%);
      color: #3e2723;
    }

    .sun {
      position: fixed;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, #FFE082 40%, #FFB300 70%, transparent 100%);
      border-radius: 50%;
      animation: pulse-sun 4s ease-in-out infinite;
      z-index: 0; pointer-events: none;
    }

    @keyframes pulse-sun {
      0%, 100% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    .wave-wrapper {
      position: fixed; bottom: 0; left: 0;
      width: 100%; pointer-events: none; z-index: 0;
    }
    .wave-wrapper svg { display: block; width: 100%; }

    .top-bar {
      position: relative;
      z-index: 1;
      max-width: 620px;
      margin: 0 auto;
      padding: 32px 20px 16px;
    }

    .back-button {
      display: inline-flex; align-items: center; gap: 6px;
      margin-bottom: 20px; padding: 10px 16px;
      background: linear-gradient(135deg, #29B6F6, #0288D1);
      color: white; text-decoration: none; border-radius: 10px;
      font-weight: 700; font-size: 0.9em;
      box-shadow: 0 4px 12px rgba(2,136,209,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .back-button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(2,136,209,0.45); }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 1.8em;
      color: #E65100;
      text-shadow: 2px 2px 0 #FFE082;
      margin-bottom: 12px;
    }

    .divider {
      border: none; height: 3px;
      background: linear-gradient(to right, #FFB300, #FF7043, #FFB300);
      border-radius: 2px;
    }

    .form-wrapper {
      position: relative;
      z-index: 1;
      max-width: 620px;
      margin: 16px auto 80px;
      padding: 0 20px;
    }

    .form-inner {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    }

    iframe {
      display: block;
      width: 100%;
      height: 960px;
      border: none;
    }
  </style>
</head>
<body>

  <div class="sun"></div>

  <div class="top-bar">
    <a class="back-button" href="./">← Tilbake til startside</a>
    <h1>Post 4 📍</h1>
    <hr class="divider">
  </div>

  <div class="form-wrapper">
    <div class="form-inner">
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfrw85F2a5mYzyt8KjrchFiN3oKeYWzUe71YKO3NhjOheoV7w/viewform?embedded=true" frameborder="0" marginheight="0" marginwidth="0">Laster inn …</iframe>
    </div>
  </div>

  <div class="wave-wrapper">
    <svg viewBox="0 0 1440 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <path d="M0,60 C240,110 480,10 720,60 C960,110 1200,10 1440,60 L1440,120 L0,120 Z" fill="rgba(2,136,209,0.35)"/>
      <path d="M0,80 C300,30 600,110 900,70 C1100,45 1300,90 1440,75 L1440,120 L0,120 Z" fill="rgba(2,136,209,0.55)"/>
    </svg>
  </div>

</body>
</html>
