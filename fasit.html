<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fasit – Sommerquiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #87CEEB 0%, #FFF176 55%, #FFB74D 100%);
      color: #3e2723;
      overflow-x: hidden;
    }

    .sun {
      position: fixed;
      top: -60px;
      right: -60px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, #FFE082 40%, #FFB300 70%, transparent 100%);
      border-radius: 50%;
      animation: pulse-sun 4s ease-in-out infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes pulse-sun {
      0%, 100% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    .wave-wrapper {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .wave-wrapper svg {
      display: block;
      width: 100%;
    }

    .container {
      position: relative;
      z-index: 1;
      padding: 40px 20px 120px;
      max-width: 620px;
      margin: auto;
    }

    .card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 36px 32px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.12);
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 24px;
      padding: 10px 16px;
      background: linear-gradient(135deg, #29B6F6, #0288D1);
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.9em;
      box-shadow: 0 4px 12px rgba(2, 136, 209, 0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .back-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(2, 136, 209, 0.45);
    }

    h1 {
      font-family: 'Pacifico', cursive;
      text-align: center;
      font-size: 2em;
      color: #E65100;
      text-shadow: 2px 2px 0 #FFE082;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .divider {
      border: none;
      height: 3px;
      background: linear-gradient(to right, #FFB300, #FF7043, #FFB300);
      border-radius: 2px;
      margin: 0 0 24px;
    }

    .content {
      font-size: 1em;
      line-height: 1.65;
      color: #4e342e;
    }

    .post-section {
      margin-bottom: 28px;
    }

    .post-title {
      font-family: 'Pacifico', cursive;
      font-size: 1.2em;
      color: #0288D1;
      margin-bottom: 14px;
    }

    .qa-item {
      background: rgba(255, 255, 255, 0.5);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .qa-item .question {
      font-weight: 700;
      color: #3e2723;
      margin-bottom: 4px;
    }

    .qa-item .answer {
      color: #388E3C;
      font-weight: 700;
    }

    .tabs {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .tab-btn {
      padding: 10px 22px;
      border: none;
      border-radius: 20px;
      font-family: 'Nunito', Arial, sans-serif;
      font-size: 0.95em;
      font-weight: 700;
      cursor: pointer;
      background: rgba(255,255,255,0.5);
      color: #5d4037;
      transition: all 0.2s;
    }

    .tab-btn:hover { background: rgba(255,255,255,0.8); }

    .tab-btn.active {
      background: linear-gradient(135deg, #FF7043, #FF5722);
      color: white;
      box-shadow: 0 4px 12px rgba(255,87,34,0.35);
    }

    .pending-message {
      text-align: center;
      font-size: 1.15em;
      color: #8d6e63;
      padding: 20px 0;
    }
  </style>
</head>
<body>

  <div class="sun"></div>

  <div class="container">
    <div class="card">
      <a class="back-button" href="./index.html">← Tilbake til startside</a>

      <h1>Fasit ✅</h1>
      <hr class="divider">

      <div class="tabs" id="fasit-tabs" style="display:none;">
        <button class="tab-btn active" onclick="showQuiz(0)">Quiz A</button>
        <button class="tab-btn"        onclick="showQuiz(1)">Quiz B</button>
        <button class="tab-btn"        onclick="showQuiz(2)">Quiz C</button>
      </div>

      <div class="content" id="fasit-content">
        <!-- Filled by script below -->
      </div>
    </div>
  </div>

  <div class="wave-wrapper">
    <svg viewBox="0 0 1440 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <path d="M0,60 C240,110 480,10 720,60 C960,110 1200,10 1440,60 L1440,120 L0,120 Z" fill="rgba(2,136,209,0.35)"/>
      <path d="M0,80 C300,30 600,110 900,70 C1100,45 1300,90 1440,75 L1440,120 L0,120 Z" fill="rgba(2,136,209,0.55)"/>
    </svg>
  </div>

  <script>
    // ↓ Endre til true når quiz er ferdig og du vil vise svarene
    const VIS_FASIT = true;
    //const VIS_FASIT = true;

    const SHEET_ID  = '1Y1IlCc7Rdr4eP29OtzfeuFMzyw2j9JBRjLM5hUA3wzQ';
    const QUIZ_NAVN = ['Quiz A', 'Quiz B', 'Quiz C'];

    const container = document.getElementById('fasit-content');

    async function loadFasit() {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Fasit&range=A14:K20&headers=0`;
      try {
        const res  = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.substr(47).slice(0, -2));
        const rows = json.table.rows.map(r => r.c.map(c => c?.v ?? ""));

        // Kolonne A = label, B–K = spørsmål/svar 1–10
        // Rad 0 = overskrift i arket, rad 1+2 = Quiz A, 3+4 = Quiz B, 5+6 = Quiz C
        QUIZ_NAVN.forEach((navn, i) => {
          const spørsmålRad = rows[i * 2 + 1];
          const svarRad     = rows[i * 2 + 2];
          if (!spørsmålRad || !svarRad) return;

          const spørsmål = spørsmålRad.slice(1);
          const svar     = svarRad.slice(1);

          const items = spørsmål.map((q, qi) => {
            if (!q && !svar[qi]) return '';
            return `
              <div class="qa-item">
                <div class="question">${q}</div>
                <div class="answer">→ ${svar[qi] ?? ''}</div>
              </div>`;
          }).filter(Boolean).join('');

          const section = document.createElement('div');
          section.className = 'post-section';
          section.id = `quiz-section-${i}`;
          section.style.display = i === 0 ? 'block' : 'none';
          section.innerHTML = `<div class="post-title">${navn}</div>${items}`;
          container.appendChild(section);
        });

        document.getElementById('fasit-tabs').style.display = 'flex';
      } catch (e) {
        container.innerHTML = `<p class="pending-message" style="color:#c62828;">Kunne ikke laste fasit: ${e.message}</p>`;
      }
    }

    function showQuiz(idx) {
      QUIZ_NAVN.forEach((_, i) => {
        const section = document.getElementById(`quiz-section-${i}`);
        if (section) section.style.display = i === idx ? 'block' : 'none';
      });
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === idx);
      });
    }

    if (!VIS_FASIT) {
      container.innerHTML = `<p class="pending-message">Her kommer fasiten når alle er i mål! 🏁</p>`;
    } else {
      container.innerHTML = `<p class="pending-message">Laster fasit…</p>`;
      loadFasit();
    }
  </script>

</body>
</html>
